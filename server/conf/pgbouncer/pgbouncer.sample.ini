; PgBouncer sample for Core Portal.
; Target sizing assumes one portal app stack on 4 vCPU / 8GB RAM,
; Postgres max_connections = 100.
;
; Use transaction pooling for high-concurrency Django workloads.

[databases]
; Route all DB names to the same Postgres service.
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; For production, prefer md5/scram with userlist/auth_query.
auth_type = trust

pool_mode = transaction
max_client_conn = 500
default_pool_size = 40
reserve_pool_size = 10
reserve_pool_timeout = 5

; Keep failed clients from hammering login paths.
max_db_connections = 50

; Timeouts and lifecycle tuning.
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_idle_timeout = 600
query_wait_timeout = 120
idle_transaction_timeout = 60

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin shell users (for SHOW STATS / SHOW POOLS).
admin_users = postgres,dev
